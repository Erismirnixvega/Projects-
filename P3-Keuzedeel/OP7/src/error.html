<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <!-- Belangrijk voor SEO: Foutpagina's NOOIT laten indexeren door zoekmachines -->
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Automatische doorverwijzing na bijvoorbeeld 5 seconden indien gewenst, of direct naar de schone URL -->
    <meta http-equiv="refresh" content="5;url=/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Fonts en Stylesheets -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    
    <!-- Duidelijke pagina titel -->
    <title>Pagina niet gevonden - Fout 404</title>
</head>
<body class="error">

    <main>
        <section>
            <h1>Fout 404</h1><br>

            <p>Als u niet automatisch wordt doorgestuurd, <a href="/">klik dan hier</a> om terug te gaan naar de homepagina.</p>
        </section>
    </main>

</body>
</html>
