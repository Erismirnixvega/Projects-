<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overschrijven</title>

</head>
<body class="bginfo">
    <div id="dashboard">
        <h1 id="overschrijftitel">Overschrijven</h1>
        <div class="coverborder" id="overschrijvenstyle">
            <form>
                <label for="van">Van rekening:</label>
                <select class="rekeningborder" id="selectvalue">
                    <option>Betaalrekening (€1532)</option>
                    <option>Spaarrekening (€3200)</option>
                </select>
                <label for="naar">Naar rekening:</label>
                <select class="rekeningborder" id="selectvalue2">
                    <option>Betaalrekening</option>
                    <option>Spaarrekening</option>
                </select>
                <label for="bedrag">Bedrag:</label>
                <span>&euro;</span>
                <input type="number" placeholder="20" required class="rekeningborder" step="0.01" id="bedrag">
            </form>
        </div>
        <button onclick="Overschrijven()">Overschrijven</button>
    </div>
<script src="script.js"></script>    
</body>
</html>
