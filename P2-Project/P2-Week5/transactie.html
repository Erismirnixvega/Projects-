<body class="bginfo">
    <div id="dashboard">
        <h1 id="transactieh1">Transactiegeschiedenis</h1><br>

        <div id="transactieborder">
            <label for="filterType">Filter op type:</label>
            <select id="filterType" onchange="applyFilter()">
                <option value="alle">Alle</option>
                <option value="inkomend">Inkomend</option>
                <option value="uitgaand">Uitgaand</option>
            </select>
        </div>

        <div id="transactieborder">
            <label for="startDate">Startdatum:</label>
            <input type="date" id="startDate" value="2025-12-01">
            <label for="endDate">Einddatum:</label>
            <input type="date" id="endDate" value="2025-12-31">
            <button onclick="applyDateFilter()">Filteren</button><br>
        </div>


    <ul id="transactionList">
        <!-- Transactions will be inserted here by JavaScript -->
    </ul>
   
    </div>
<script src="script.js"></script>
